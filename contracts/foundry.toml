[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
hashkey_testnet = "${HASHKEY_TESTNET_RPC_URL}"
hashkey_mainnet = "${HASHKEY_MAINNET_RPC_URL}"

[etherscan]
hashkey_testnet = { key = "", chain = 133, url = "https://testnet-explorer.hsk.xyz/api" }
hashkey_mainnet = { key = "", chain = 177, url = "https://hashkey.blockscout.com/api" }
